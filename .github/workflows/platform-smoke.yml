name: Platform Smoke

on:
  push:
    branches:
      - main
      - develop
      - feature/*
      - feat/*
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke-${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      BOATRACE_TESTING_MODE: "true"
      MPLBACKEND: Agg
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -e .

      - name: Install libomp on macOS
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Check CLI entry points
        run: |
          python scripts/boatrace_bootstrap.py --help
          python scripts/boatrace_local_pipeline.py --help
          python scripts/boatrace_prediction_query.py --help
          python scripts/boatrace_program_sheet.py --help

      - name: Validate POSIX installer
        if: runner.os != 'Windows'
        run: bash -n scripts/install_boatrace_local.sh

      - name: Validate PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          [void][scriptblock]::Create((Get-Content 'scripts/install_boatrace_local.ps1' -Raw))

      - name: Run cross-platform smoke tests
        shell: bash
        run: |
          python -m pytest -q tests/scripts/test_boatrace_bootstrap.py tests/scripts/test_boatrace_program_sheet.py tests/pipeline/test_duckdb_prediction_repository.py tests/pipeline/test_local_prediction_pipeline.py tests/agentic/test_agentic_scenario_harness.py
