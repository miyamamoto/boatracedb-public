[tool:pytest]
# pytest configuration for boatrace prediction system

# Test discovery
testpaths =
    tests/agentic
    tests/crawler
    tests/pipeline
    tests/scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .venv output data models logs

# Output configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    database: marks tests that require database connection
    model: marks tests for machine learning models
    features: marks tests for feature engineering

# Minimum version
minversion = 6.0

# Test output
junit_family = xunit2

# Coverage options (if using pytest-cov)
# --cov=src
# --cov-report=html
# --cov-report=term-missing
